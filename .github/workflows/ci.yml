name: Primer CI

#triggers
on: 
  push:
  pull_request:

#jobs
#con una misma tuberia CI se pueden validar multiples configuraciones de entornos de ejecucion
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"  
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run lint
        run: ruff check .
  test:
    runs-on: ubuntu-latest
    needs: lint #le hace dependiente de lint
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python 
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}  
      - name: Install dependencies
        run: pip install -r requirements.txt 
      - name: Run tests
        run: pytest 
# la imagen del docker solo se puede crear si es que se paso el lint y los tests
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t my-first-github-actions-workflow .

